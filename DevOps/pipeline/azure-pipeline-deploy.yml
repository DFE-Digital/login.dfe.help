name: $(BuildDefinitionName)_tag-$(BuildID)_at-$(Date:yyyyMMdd)$(Rev:.r)
resources:
  repositories:
  # Defult branch is master
    - repository: devopsTemplates
      type: github
      endpoint: DfE-Digital
      name: DFE-Digital/login.dfe.devops
      ref: feature/DSI-7180
    - repository: config
      type: github
      endpoint: DfE-Digital
      name: DFE-Digital/login.dfe.dsi-config
      ref: main
  pipelines:
  - pipeline: artifacts
    source: \Build\DFE-Digital.login.dfe.help
    trigger: 
      branches:
        include: 
        - feature/*
        - main
        - releases/*

trigger: none
pr: none

parameters:
- name: location
  type: object
  displayName: 'Deployment locations (- westeurope & - northeurope)'
  default:
    - westeurope
    - northeurope
- name: InfrDeploy
  type: boolean
  displayName: 'Infrastrucure Deployment only'
  default: false
- name: tran
  type: boolean
  displayName: 'Transformation Deployment'
  default: false
- name: dev
  type: boolean
  displayName: 'Dev Deployment'
  default: false
- name: test
  type: boolean
  displayName: 'Test Deployment'
  default: false
- name: pp
  type: boolean
  displayName: 'Pre-Prod Deployment'
  default: false
- name: pr
  type: boolean
  displayName: 'Prod Deployment'
  default: false
- name: gitCheck
  type: boolean
  displayName: 'Bypass Git Check in Test'
  default: false

variables:
- group: dsi-global
- name: applicationShortName
  value: 'hlp'
- name: applicationFullName
  value: 'help'
- name: numberOfWorkers
  value: 1
- name: tran
  ${{ if eq(parameters.tran, 'true') }}:
    value: true
  ${{ else }}:
    value: false
- name: dev
  ${{ if or(eq(parameters.dev, 'true'), contains($[variables.resources.pipeline.artifacts.SourceBranch],'feature')) }}:
    value: true
  ${{ else }}:
    value: false
- name: test
  ${{ if or(eq(parameters.test, 'true'), contains(variables['resources.pipeline.artifacts.SourceBranch'],'feature')) }}:
    value: true
  ${{ else }}:
    value: false
- name: pp
  ${{ if and(or(eq(parameters.pp, 'true'), contains(variables['resources.pipeline.artifacts.SourceBranch'],'main')), not(contains(variables['Build.SourceVersionMessage'],'Upgrade to version'))) }}:
    value: true
  ${{ else }}:
    value: false
- name: pr
  ${{ if or(eq(parameters.pr, 'true'), contains(variables['resources.pipeline.artifacts.SourceBranch'],'release')) }}:
    value: true
  ${{ else }}:
    value: false

stages:

- ${{ each location in parameters.location }}:
  - ${{ each var in variables }}:
    - ${{ if in(var.key, 'tran','dev','test','pp','pr') }}:
      - ${{ if eq(var.value, 'true') }}:
        - ${{ if or(and(in(var.key, 'tran','pp','pr'),eq(location, 'northeurope')),and(in(var.key, 'tran','dev','test','pp','pr'),eq(location, 'westeurope'))) }}:
          - stage: Deployment_${{var.key}}_${{location}}
            displayName: "Deployment [${{var.key}}] ${{location}}"
            pool: Self-hosted Test
            ${{ if eq(location,'northeurope') }}:
              ${{ if eq(length(parameters.location), 2) }}:
                dependsOn: 
                - Deployment_${{var.key}}_westeurope
            variables:
            - name: environmentId
              ${{ if eq(var.key, 'tran') }}:
                value: d03
              ${{ if eq(var.key, 'dev') }}:
                value: d01
              ${{ if eq(var.key, 'test') }}:
                value: t01
              ${{ if eq(var.key, 'pp') }}:
                value: t02
              ${{ if eq(var.key, 'pr') }}:
                value: p01
            jobs:
            - template: pipeline/deployment.yml@devopsTemplates
              parameters:
                ${{ if or(eq(var.key, 'dev'), eq(var.key, 'tran')) }}:
                  serviceConnection: $(devServiceConnection)
                ${{ elseif eq(var.key, 'pr') }}:
                  serviceConnection: $(prodServiceConnection)
                ${{ else }}:
                  serviceConnection: $(testServiceConnection)
                environmentName: ${{var.key}}
                applicationShortName: ${{variables.applicationShortName}}
                applicationFullName: ${{variables.applicationFullName}}
                InfrDeploy: ${{parameters.InfrDeploy}}
                deploymentLocation: ${{location}}
                runtimeStack: NODE|18-lts
                pm2ProcessFileName: process.json
                gitCheck: ${{parameters.gitCheck}}
          
          - ${{ if and(eq(var.key, 'pr'),eq(location, 'westeurope')) }}:
            - stage: branchPrTag
              displayName: "GitHub PR & Release Branch Tag"
              dependsOn: 
              - Deployment_${{var.key}}_${{location}}
              jobs:
              - template:  pipeline/tagCreation.yml@devopsTemplates
                parameters:
                  applicationName: ${{variables.applicationFullName}}